name: Template validation and release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version:
    name: Calculate release version
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.gitversion.outputs.majorMinorPatch }}

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.1.1
        with:
          fetch-depth: 0

      - name: Set up GitVersion
        uses: gittools/actions/gitversion/setup@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0
        with:
          versionSpec: '6.7.x'

      - name: Calculate version
        id: gitversion
        uses: gittools/actions/gitversion/execute@bc6623af8fc07d5a8903052dd46da33403eec8e8 # v4.5.0

  yaml_lint:
    name: Lint YAML files
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.1.1

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: python -m pip install --upgrade pip yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

  validate:
    name: Validate template schema and WIQL
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.1.1
        with:
          fetch-depth: 0

      - name: Validate template schema and WIQL
        shell: pwsh
        run: ./scripts/Test-TemplateFiles.ps1 -Path .

  release:
    name: Publish GitHub release assets
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - yaml_lint
      - validate
      - version
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.1.1
        with:
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ needs.version.outputs.release_version }}
          TITLE: PolicyVault Templates v${{ needs.version.outputs.release_version }}
        run: |
          set -euo pipefail

          if gh release view "${TAG}" >/dev/null 2>&1; then
            is_draft=$(gh release view "${TAG}" --json isDraft --jq '.isDraft')
            if [ "$is_draft" = "false" ]; then
              echo "Release ${TAG} is already published. Nothing to do."
              exit 0
            fi
            echo "Release ${TAG} exists as a draft (previous failed run). Retrying upload."
          else
            gh release create "${TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${TITLE}" \
              --generate-notes \
              --draft
          fi

          mapfile -t template_files < <(git ls-files \
            '*.yml' '*.yaml' \
            ':(exclude).github/**' \
            ':(exclude)scripts/**' \
            ':(exclude)dist/**' \
            | awk -F/ 'NF > 1' \
            | sort)

          if [ "${#template_files[@]}" -eq 0 ]; then
            echo "No template YAML files found to upload."
            exit 1
          fi

          asset_args=()
          for file in "${template_files[@]}"; do
            relative_path="${file#./}"
            asset_name="${relative_path//\//-}"
            asset_args+=("${file}#${asset_name}")
          done

          gh release upload "${TAG}" --clobber "${asset_args[@]}"

          gh release edit "${TAG}" --draft=false
