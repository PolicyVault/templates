apiVersion: policyvault.io/v1
kind: WorkItemQueryPolicy
metadata:
  name: active-backlog-items-must-have-estimates
  title: Active Backlog Items Must Have Positive Estimates
  description: >
    Selects active requirement-category and bug-category work items that have
    a valid positive estimate in Microsoft.VSTS.Scheduling.Effort, including
    only items with Effort > 0.
  tags:
    - planning
    - estimation
    - backlog

source:
  platform: azure-devops
  queryName: Policy - Active Items With Estimates
  query: |
    SELECT [System.Id], [System.WorkItemType], [System.Title], [System.AssignedTo],
           [System.State], [Microsoft.VSTS.Scheduling.Effort], [System.AreaPath], [System.Tags]
    FROM WorkItems
    WHERE [System.TeamProject] = @project
      AND (
        [System.WorkItemType] IN GROUP 'Microsoft.RequirementCategory'
        OR [System.WorkItemType] IN GROUP 'Microsoft.BugCategory'
      )
      AND [System.State] NOT IN ('New', 'Removed', 'Rejected', 'Done')
      AND [Microsoft.VSTS.Scheduling.Effort] > 0
    ORDER BY [System.AreaPath]

policy:
  rules:
    - id: active-items-must-be-estimated
      description: Work items must match the estimated active items query.
      mustBeInQueryResults: true
  severity: medium
  action: warn
