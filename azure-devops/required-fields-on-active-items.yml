apiVersion: policyvault.io/v1
kind: WorkItemQueryPolicy
metadata:
  name: required-fields-on-active-items
  title: Required Fields Populated on Active Work Items
  description: >
    Ensures that all active work items have the mandatory fields populated:
    Assigned To, Area Path, and Iteration Path. Incomplete metadata leads
    to inaccurate reporting and broken sprint planning. Uses work item type
    categories to stay process-template agnostic.
  tags:
    - hygiene
    - metadata
    - work-items

source:
  platform: azure-devops
  # The query intentionally selects items that are MISSING at least one required
  # field so that a max_count: 0 rule catches them immediately.
  query: |
    SELECT [System.Id], [System.Title], [System.State],
           [System.AssignedTo], [System.AreaPath], [System.IterationPath]
    FROM WorkItems
    WHERE [System.TeamProject] = @project
      AND (
        [System.WorkItemType] IN GROUP 'Microsoft.RequirementCategory'
        OR [System.WorkItemType] IN GROUP 'Microsoft.TaskCategory'
        OR [System.WorkItemType] IN GROUP 'Microsoft.BugCategory'
        OR [System.WorkItemType] IN GROUP 'Microsoft.FeatureCategory'
      )
      AND [System.State] IN ('Active', 'In Progress', 'Committed')
      AND (
        [System.AssignedTo] = ''
        OR [System.AreaPath]      = @project
        OR [System.IterationPath] = @project
      )
    ORDER BY [System.ChangedDate] DESC

policy:
  rules:
    - id: assigned-to-not-empty
      description: Every active work item must be assigned to a team member.
      condition: field_not_empty
      field: System.AssignedTo

    - id: area-path-set
      description: Area Path must be set to a value other than the project root.
      condition: field_not_empty
      field: System.AreaPath

    - id: iteration-path-set
      description: Iteration Path must be set to a value other than the project root.
      condition: field_not_empty
      field: System.IterationPath
  severity: low
  action: warn
