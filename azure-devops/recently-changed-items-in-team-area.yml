apiVersion: policyvault.io/v1
kind: WorkItemQueryPolicy
metadata:
  name: recently-changed-items-in-team-area
  title: Recently Changed Items In Team Area
  description: >
    Returns recently changed work items for a specific team area. Replace
    TEAM_AREA_DESCRIPTOR with your team descriptor in the
    @teamAreas('[Project]\Team <id:GUID>') format.
  tags:
    - team-scope
    - area-path
    - pull-request

source:
  platform: azure-devops
  query: |
    SELECT [System.Id], [System.WorkItemType], [System.Title], [System.AssignedTo],
           [System.State], [System.Tags]
    FROM WorkItems
    WHERE [System.TeamProject] = @project
      AND [System.ChangedDate] > @today - 60
      AND [System.AreaPath] = @teamAreas('TEAM_AREA_DESCRIPTOR')

policy:
  rules:
    - id: at-least-one-recent-item-in-team-area
      description: At least one recently changed item should exist in the team area.
      condition: min_count
      threshold: 1
  severity: low
  action: notify
