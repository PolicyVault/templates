apiVersion: policyvault.io/v1
kind: WorkItemQueryPolicy
metadata:
  name: recently-changed-items-in-team-area
  title: Recently Changed Items In Team Area
  description: >
    Flags recently changed work items that are outside a specific team area.
    Replace TEAM_AREA_DESCRIPTOR with your team descriptor in the
    @teamAreas('[Project]\Team <id:GUID>') format.
  tags:
    - team-scope
    - area-path
    - pull-request

source:
  platform: azure-devops
  queryName: Policy - Recent Items Outside Team Area
  query: |
    SELECT [System.Id], [System.WorkItemType], [System.Title], [System.AssignedTo],
           [System.State], [System.Tags]
    FROM WorkItems
    WHERE [System.TeamProject] = @project
      AND [System.ChangedDate] > @today - 60
      AND NOT [System.AreaPath] UNDER @teamAreas('TEAM_AREA_DESCRIPTOR')

policy:
  rules:
    - id: zero-recent-items-outside-team-area
      description: Work items must not match the outside-team-area query.
      condition: false
  severity: low
  action: warn
